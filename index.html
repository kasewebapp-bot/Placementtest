<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Drive 2026 | Register Now</title>
    <meta name="description"
        content="Official registration portal for the Placement Drive on 28th February 2026. 100+ companies, 1000+ vacancies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <nav class="container">
            <div class="logo" style="display: flex; align-items: center; gap: 1rem;">
                <img src="https://res.cloudinary.com/dbpyjdqt2/image/upload/kase-1-scaled_u5ygsl.jpg"
                    alt="KASE Logo" style="height: 50px;">
                <img src="https://res.cloudinary.com/dbpyjdqt2/image/upload/v1771854785/odepc_prctuo.avif"
                    alt="ODEPEC Logo" style="height: 50px;">
            </div>
            <a href="login.html" class="btn btn-primary">Candidate Login</a>
        </nav>
    </header>

    <!-- REGISTRATION SECTION -->
    <section id="register" class="registration">
        <div class="container">
            <div class="form-container">
                <h2 class="section-title">Registration Form</h2>

                <form id="placementForm">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="mobile" required pattern="[0-9]{10}" maxlength="10">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Registration</button>

                </form>
            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="script.js"></script>

    <!-- 🔥 FIREBASE FULL INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCc4V9ajkcLEA3qPWjXc06lUeAV9xGSE88",
            authDomain: "placements-1ce4f.firebaseapp.com",
            projectId: "placements-1ce4f",
            storageBucket: "placements-1ce4f.firebasestorage.app",
            messagingSenderId: "84862719855",
            appId: "1:84862719855:web:060baa1a6f8b19524bfa9a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById("placementForm");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const fullName = document.getElementById("fullName").value;
            const mobile = document.getElementById("mobile").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const fakeEmail = mobile + "@placement.com";

            try {

                await createUserWithEmailAndPassword(auth, fakeEmail, password);

                await setDoc(doc(db, "users", mobile), {
                    fullName,
                    email,
                    mobile,
                    createdAt: new Date()
                });

                alert("Registration Successful!");

            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>

</body>
</html>
