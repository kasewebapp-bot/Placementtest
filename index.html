<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Placement Drive 2026 - Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Candidate Registration</h2>

<form id="placementForm">
  <input type="text" id="fullName" placeholder="Full Name" required><br><br>
  <input type="tel" id="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}" maxlength="10"><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="password" id="password" placeholder="Create Password" required><br><br>
  <button type="submit">Register</button>
</form>

<p>Already registered? <a href="login.html">Login here</a></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARoLteIbD8oFPEtKJ3ZvhxkiOHNgfC-I4",
  authDomain: "placements2026-free.firebaseapp.com",
  projectId: "placements2026-free",
  storageBucket: "placements2026-free.firebasestorage.app",
  messagingSenderId: "672350914241",
  appId: "1:672350914241:web:171f23d75e76a96f103640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("placementForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const fullName = document.getElementById("fullName").value;
  const mobile = document.getElementById("mobile").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const fakeEmail = mobile + "@placement.com";

  try {
    await createUserWithEmailAndPassword(auth, fakeEmail, password);

    await setDoc(doc(db, "users", mobile), {
      fullName,
      email,
      mobile,
      createdAt: new Date()
    });

    alert("Registration Successful!");
    window.location.href = "login.html";

  } catch (error) {
    alert(error.message);
  }
});
</script>

</body>
</html>
