<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Drive 2026 | Register Now</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">
<nav class="container">
<div class="logo" style="display:flex;align-items:center;gap:1rem;">
<img src="https://res.cloudinary.com/dbpyjdqt2/image/upload/kase-1-scaled_u5ygsl.jpg" style="height:50px;">
<img src="https://res.cloudinary.com/dbpyjdqt2/image/upload/v1771854785/odepc_prctuo.avif" style="height:50px;">
</div>
<a href="login.html" class="btn btn-primary">Candidate Login</a>
</nav>
</header>

<section id="register" class="registration">
<div class="container">
<div class="form-container">

<h2 class="section-title">Registration Form</h2>

<form id="placementForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullName" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="mobile" required pattern="[0-9]{10}" maxlength="10">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="form-group">
<label>Gender</label>
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

<button type="submit" class="btn btn-primary">Submit Registration</button>

</form>

</div>
</div>
</section>

<footer class="footer-bottom">
<div class="container">
<p>&copy; KASE 2026 Placement Drive</p>
</div>
</footer>

<!-- Firebase + Registration Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyARoLteIbD8oFPEtKJ3ZvhxkiOHNgfC-I4",
authDomain: "placements2026-free.firebaseapp.com",
projectId: "placements2026-free",
storageBucket: "placements2026-free.firebasestorage.app",
messagingSenderId: "672350914241",
appId: "1:672350914241:web:171f23d75e76a96f103640"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("placementForm").addEventListener("submit", async function(e){

e.preventDefault();

const mobile = document.getElementById("mobile").value;
const password = document.getElementById("password").value;
const fullName = document.getElementById("fullName").value;
const email = document.getElementById("email").value;
const gender = document.querySelector('input[name="gender"]:checked')?.value || "";

const fakeEmail = mobile + "@placement.com";

try {

await createUserWithEmailAndPassword(auth, fakeEmail, password);

const regId = "KASE/PD/NM/" + Math.floor(1000 + Math.random() * 9000);

await setDoc(doc(db, "users", mobile), {
fullName,
email,
gender,
mobile,
regId,
createdAt: new Date()
});

alert("Registration Successful!");

this.reset();

} catch(error){
alert(error.message);
}

});
</script>

</body>
</html>
